name: Update .env on VPS

on:
  workflow_dispatch:
    inputs:
      env_vars:
        description: 'Variables in JSON format (e.g. {"PORT": "3000"})'
        required: true
        default: ''
      project_folder:
        description: 'Project folder on VPS (e.g. /home/user/project)'
        required: true
        default: 'projects/coraje-client'

jobs:
  update-env:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Update Env Vars
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            FOLDER = "${{ inputs.project_folder }}"
            cd "$FOLDER"
            echo '${{ github.event.inputs.env_vars }}' | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' > .env